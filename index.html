<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,200..800&family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <title>Frontend Mentor | Weather app</title>
</head>
<body>
  <main>
    <section class="container">
      <header class="header">
        <div class="logo">
          <img src="./assets/images/logo.svg" alt="logo">
        </div>

        <!-- dropdown -->
        <div class="units-dropdown">
          <button type="button" class="dropbtn">
            <img src="./assets/images/icon-units.svg" alt="">
            <span>Units</span>
            <img src="./assets/images/icon-dropdown.svg" alt="">
          </button>
          
          <div class="dropdown-content">
            <h3>Switch to Imperial</h3>
            <div class="temperature">
              <span>Temperature</span>
              <button type="button">Celsius (°C)</button>
              <button type="button">Fahrenheit (°F)</button>
            </div>
            <hr>
            <div class="wind-speed">
              <span>Wind Speed</span>
              <button type="button">km/h</button>
              <button type="button">mph</button>
            </div>
            <hr>
            <div class="precipitation">
              <span>Precipitation</span>
              <button type="button">Millimeters (mm)</button>
              <button type="button">Inches (in)</button>
            </div>
          </div>
        </div>
      </header>

      <form class="search-form">
          <h1>How's the sky looking today?</h1>
          <div class="search-box">
              <img class="search-icon" src="./assets/images/icon-search.svg" alt="">
              <input class="search-input" type="text" placeholder="Search for place..." name="city">
          </div>

          <button type="submit" class="search-button">Search</button>
      </form>

      <section class="current-weather-details">

          <div class="current-weather">
            <div class="location-info">
              <!-- <h2>Berlin, Germany</h2> -->
              <!-- <p>Tuesday, Aug 5, 2025</p> -->
            </div>

            <div class="temperature">
              <!-- <img src="./assets/images/icon-sunny.webp" alt="Sunny weather"> -->
              <!-- <span class="temp">20°C</span> -->
            </div>
          </div>
      </section>

      <section class="weather-details">

        <div class="detail">
          <span>Feels Like</span>
          <strong>_</strong>
        </div>

        <div class="detail">
          <span>Humidity</span>
          <strong>_</strong>
        </div>

        <div class="detail">
          <span>Wind</span>
          <strong>_</strong>
        </div>

        <div class="detail">
          <span>Precipitation</span>
          <strong>_</strong>
        </div>
      </section>

      <section class="daily-forecast">
        <h2>Daily Forecast</h2>

        <div class="cards">

        <div class="day-card">
          <time class="day"></time>
          <div class="temps">
            <span></span>
            <span></span>
          </div>
        </div>

        <div class="day-card">
          <div class="temps">
            <span></span>
            <span></span>
          </div>
        </div>

        <div class="day-card">
          <div class="temps">
            <span></span>
            <span></span>
          </div>
        </div>

        <div class="day-card">
          <div class="temps">
            <span></span>
            <span></span>
          </div>
        </div>

        <div class="day-card">
          <div class="temps">
            <span></span>
            <span></span>
          </div>
        </div>

        <div class="day-card">
          <div class="temps">
            <span></span>
            <span></span>
          </div>
        </div>

        <div class="day-card">
          <div class="temps">
            <span></span>
            <span></span>
          </div>
        </div>

        </div>
      </section>

      <section class="hourly-forecast">
        
        <div class="hourly-forecast-details">
          <div class="hourly-header">
            <h2>Hourly Forecast</h2>

            <div class="hourly-dropdown">

              <button class="hourly-dropbtn">- 
                <img src="./assets/images/icon-dropdown.svg" alt="">
              </button>

              <div class="dropdown-content">
                <button class="hourly-dropbtn">Monday</button>
                <button class="hourly-dropbtn">Tuesday</button>
                <button class="hourly-dropbtn">Wednesday</button>
                <button class="hourly-dropbtn">Thursday</button>
                <button class="hourly-dropbtn">Friday</button>
                <button class="hourly-dropbtn">Saturday</button>
                <button class="hourly-dropbtn">Sunday</button>
              </div>

            </div> 
        </div>

        <div class="timings">
          <div class="time"></div>
          <div class="time"></div>
          <div class="time"></div>
          <div class="time"></div>
          <div class="time"></div>
          <div class="time"></div>
          <div class="time"></div>
          <div class="time"></div>
        </div>
        </div>

      </section>


    </section>
  </main>
</body>
</html>
